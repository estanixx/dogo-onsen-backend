services:
  - type: web
    name: dogo-onsen-backend
    runtime: docker
    dockerfilePath: ./project/Dockerfile
    dockerContext: ./project
    plan: free
    healthCheckPath: /health
    preDeployCommand: "./migrate.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dogo-onsen-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false  # Set this manually in Render dashboard
      - key: CORS_ALLOW_ORIGINS
        value: https://dogo-onsen-app.onrender.com,http://localhost:3000
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11

databases:
  - name: dogo-onsen-db
    databaseName: dogo_onsen
    user: dogo_admin
    plan: free
